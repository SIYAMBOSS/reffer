<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@web3modal/html@2.4.7/dist/index.js"></script>
</head>
<body>

    <!-- Persistent Header Balance -->
    <div class="header">
        <p>Main Balance</p>
        <h1 id="user-balance">$0.00</h1>
    </div>

    <!-- Multi-File Content Loader via Objects -->
    <div class="main-content">
        <object data="home.html" id="home" class="page active"></object>
        <object data="task.html" id="task" class="page"></object>
        <object data="wallet.html" id="wallet" class="page"></object>
        <object data="team.html" id="team" class="page"></object>
    </div>

    <!-- Universal Wallet Modal Selection Overlay -->
    <div id="walletModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeWalletModal()">&times;</span>
            <div class="modal-title">Select Wallet</div>
            <div class="wallet-option" onclick="selectWallet('Trust Wallet')">
                <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.png" alt="Trust Wallet">
                <span>Trust Wallet</span>
            </div>
            <div class="wallet-option" onclick="selectWallet('MetaMask')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Logo.svg" alt="MetaMask">
                <span>MetaMask</span>
            </div>
            <div class="wallet-option" onclick="selectWallet('Binance Wallet')">
                <img src="https://vignette.wikia.nocookie.net/logopedia/images/a/a9/Binance_Icon.png" alt="Binance">
                <span>Binance Wallet</span>
            </div>
        </div>
    </div>

    <!-- Fixed Bottom Menu -->
    <div class="nav-bar">
        <button class="nav-item active" onclick="switchPage('home', this)"><span>🏠</span>Home</button>
        <button class="nav-item" onclick="switchPage('task', this)"><span>📋</span>Task</button>
        <button class="nav-item" onclick="switchPage('wallet', this)"><span>💰</span>Wallet</button>
        <button class="nav-item" onclick="switchPage('team', this)"><span>👥</span>Team</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
