<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- অফিশিয়াল ওয়ালেট কানেক্ট প্রোভাইডার স্ক্রিপ্ট -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body>

    <!-- Persistent Header Balance -->
    <div class="header">
        <p>Main Balance</p>
        <h1 id="user-balance">$0.00</h1>
    </div>

    <!-- Multi-File Content Loader via Objects -->
    <div class="main-content">
        <object data="home.html" id="home" class="page active"></object>
        <object data="task.html" id="task" class="page"></object>
        <object data="wallet.html" id="wallet" class="page"></object>
        <object data="team.html" id="team" class="page"></object>
    </div>

    <!-- Universal Wallet Modal Selection Overlay -->
    <div id="walletModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeWalletModal()">&times;</span>
            <div class="modal-title">Select Wallet</div>
            
            <!-- Trust Wallet -->
            <div class="wallet-option" onclick="connectViaApp('trust')">
                <img src="https://assets.coingecko.com/coins/images/11019/large/trustwallet.png" alt="Trust">
                <span>Trust Wallet</span>
            </div>
            
            <!-- MetaMask -->
            <div class="wallet-option" onclick="connectViaApp('metamask')">
                <img src="https://assets.coingecko.com/coins/images/25184/large/metamask.png" alt="MetaMask">
                <span>MetaMask</span>
            </div>
        </div>
    </div>

    <!-- Fixed Bottom Menu -->
    <div class="nav-bar">
        <button class="nav-item active" onclick="switchPage('home', this)"><span>🏠</span>Home</button>
        <button class="nav-item" onclick="switchPage('task', this)"><span>📋</span>Task</button>
        <button class="nav-item" onclick="switchPage('wallet', this)"><span>💰</span>Wallet</button>
        <button class="nav-item" onclick="switchPage('team', this)"><span>👥</span>Team</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
